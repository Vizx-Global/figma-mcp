<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #eee;
    padding: 20px;
    font-size: 13px;
  }
  .logo {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 16px;
  }
  .logo strong { color: #fff; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: #242424;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
    transition: background .3s;
  }
  .dot.connected   { background: #4caf7d; box-shadow: 0 0 6px #4caf7d88; }
  .dot.connecting  { background: #f0a500; animation: pulse 1s infinite; }
  .dot.error       { background: #e05252; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  .status-text { font-size: 12px; color: #aaa; }
  .log {
    background: #111;
    border-radius: 8px;
    padding: 10px;
    height: 120px;
    overflow-y: auto;
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    color: #666;
    line-height: 1.6;
  }
  .log .ok  { color: #4caf7d; }
  .log .err { color: #e05252; }
  .log .cmd { color: #c8b89a; }
  .btn {
    margin-top: 12px;
    width: 100%;
    padding: 8px;
    background: #2a2a2a;
    border: 0.5px solid #444;
    border-radius: 6px;
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
  }
  .btn:hover { background: #333; }
  .port-row {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .port-row input {
    flex: 1; padding: 7px 10px;
    background: #242424; border: 0.5px solid #444;
    border-radius: 6px; color: #eee; font-size: 12px;
  }
  .port-row button {
    padding: 7px 14px;
    background: #0e0e0e; border: 0.5px solid #555;
    border-radius: 6px; color: #ccc; font-size: 12px; cursor: pointer;
  }
  .port-row button:hover { background: #222; }
</style>
</head>
<body>
<div class="logo"><strong>VizX</strong> · Claude ↔ Figma Bridge</div>

<div class="port-row">
  <input id="wsUrl" value="wss://YOUR-APP.railway.app" placeholder="wss://YOUR-APP.railway.app"/>
  <button onclick="reconnect()">Connect</button>
</div>

<div class="status">
  <div class="dot connecting" id="dot"></div>
  <span class="status-text" id="statusText">Connecting…</span>
</div>

<div class="log" id="log"></div>
<button class="btn" onclick="clearLog()">Clear log</button>

<script>
let ws;
const pending = new Map();
let msgCounter = 0;

function log(text, cls = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = new Date().toLocaleTimeString() + ' ' + text;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusText').textContent = text;
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

function connect() {
  const url = document.getElementById('wsUrl').value.trim();
  setStatus('connecting', 'Connecting…');
  log('Connecting to ' + url);

  try { ws = new WebSocket(url); } catch(e) { setStatus('error', 'Bad URL'); return; }

  ws.onopen = () => {
    setStatus('connected', 'Connected to MCP server');
    log('Connected — ready for Claude commands', 'ok');
  };

  ws.onclose = () => {
    setStatus('error', 'Disconnected — click Connect to retry');
    log('Disconnected', 'err');
    setTimeout(() => { if (ws.readyState === WebSocket.CLOSED) connect(); }, 4000);
  };

  ws.onerror = () => {
    setStatus('error', 'Connection error');
    log('WebSocket error', 'err');
  };

  ws.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch(e) { return; }

    log('← ' + msg.command + (msg.payload ? ' ' + JSON.stringify(msg.payload).slice(0, 60) : ''), 'cmd');

    // Forward to plugin main thread
    parent.postMessage({ pluginMessage: { id: msg.id, command: msg.command, payload: msg.payload } }, '*');
  };
}

// Receive results from plugin main thread
window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.error) {
    log('✗ ' + msg.error, 'err');
    ws && ws.send(JSON.stringify({ id: msg.id, error: msg.error }));
  } else {
    log('✓ ' + JSON.stringify(msg.result).slice(0, 80), 'ok');
    ws && ws.send(JSON.stringify({ id: msg.id, result: msg.result }));
  }
};

function reconnect() { if (ws) ws.close(); setTimeout(connect, 300); }

connect();
</script>
</body>
</html>
